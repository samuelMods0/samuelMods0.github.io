<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Never Gonna Give You Up</title>
</head>
<body>
    <div class="center">
        <h1>Thanks for a Wonderful Four Years!</h1>
        <iframe
            width="1120"
            height="630"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?si=S84fHHlpCtLkC0aq"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request("screen");
                console.log("Wake Lock active");

                wakeLock.addEventListener("release", () => {
                    console.log("Wake Lock released");
                });
            } catch (err) {
                console.error(`${err.name}: ${err.message}`);
            }
        }

        // Request it once the page loads.
        window.addEventListener("load", requestWakeLock);

        // If the page becomes visible again (for example after sleep),
        // try requesting it again.
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                requestWakeLock();
            }
        });
    </script>

    <style>
        html {
            color:white;
            background-color: black;
        }
        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</body>
</html>
